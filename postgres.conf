# ==============================================================================
# postgres.conf — Tuning para VPS 2 vCPU / 8GB RAM
# Montado en /var/lib/postgresql/data/postgresql.conf del container
# Container mem_limit: 1.5g — estos valores suman ~1.2GB de RAM activa
# ==============================================================================

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 384MB              # 25% del límite del container
effective_cache_size = 1152MB       # 75% — le dice al planner cuánta RAM hay
work_mem = 8MB                      # por operación sort/hash join
maintenance_work_mem = 128MB        # vacuum, index rebuild, CREATE INDEX
wal_buffers = 16MB

# ── CPU (2 vCPU) ──────────────────────────────────────────────────────────────
max_parallel_workers_per_gather = 1
max_parallel_workers = 2
max_worker_processes = 4

# ── Connections ───────────────────────────────────────────────────────────────
max_connections = 100                # default — server + worker + admin tools + migraciones

# ── SSD optimization ───────────────────────────────────────────────────────────
random_page_cost = 1.1              # default 4.0 overestima SSD seek time
effective_io_concurrency = 200

# ── Checkpoints ───────────────────────────────────────────────────────────────
checkpoint_completion_target = 0.9
min_wal_size = 512MB
max_wal_size = 2GB

# ── Planner ───────────────────────────────────────────────────────────────────
default_statistics_target = 100
jit = off                           # JIT overhead > benefit en queries cortas OLTP