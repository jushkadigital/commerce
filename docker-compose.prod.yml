# ==============================================================================
# docker-compose.prod.yml — Producción VPS
# ==============================================================================

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-medusa
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa-starter
      POSTGRES_PASSWORD: medusa-password
      POSTGRES_DB: medusa-starter
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=384MB"
      - "-c"
      - "effective_cache_size=1152MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "max_parallel_workers=2"
      - "-c"
      - "max_parallel_workers_per_gather=1"
      - "-c"
      - "max_worker_processes=4"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "jit=off"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /var/run/postgresql
      - /tmp:size=100M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa-starter -d medusa-starter"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - medusa-network
    security_opt:
      - no-new-privileges:true
    shm_size: "512m"
    mem_reservation: 1g
    mem_limit: 2g
    pids_limit: 500
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "384mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    volumes:
      - cache-backend-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medusa-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_reservation: 256m
    mem_limit: 512m
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Medusa Server ──────────────────────────────────────────────────────────
  backend-server:
    container_name: medusa-app-server
    image: urgosxd7/medusa-app:latest # TODO: pin a digest SHA para deploys reproducibles
    restart: unless-stopped
    volumes:
      - backend-server-data:/data
      - ./src/scripts:/opt/medusa/.medusa/server/src/scripts:ro
    expose:
      - "9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MEDUSA_WORKER_MODE: server
      DISABLE_MEDUSA_ADMIN: "false"
      RUN_SETUP_STORE: "false"
      UV_THREADPOOL_SIZE: "8"
      NODE_OPTIONS: "--max-old-space-size=1024"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      start_period: 400s
      retries: 10
    networks:
      - medusa-network
      - red-compartida
      - proxiable
    security_opt:
      - no-new-privileges:true
    mem_reservation: 768m
    mem_limit: 1.5g
    pids_limit: 1000
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Medusa Worker ──────────────────────────────────────────────────────────
  backend-worker:
    container_name: medusa-app-worker
    image: urgosxd7/medusa-app:latest # TODO: pin a digest SHA para deploys reproducibles
    restart: unless-stopped
    volumes:
      - backend-server-data:/data # compartido: uploads/archivos locales
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MEDUSA_WORKER_MODE: worker
      DISABLE_MEDUSA_ADMIN: "true"
      UV_THREADPOOL_SIZE: "8"
      NODE_OPTIONS: "--max-old-space-size=768"
    healthcheck:
      # El worker no expone HTTP; verificamos que el proceso node está vivo
      test: ["CMD-SHELL", "pgrep -f 'medusa start' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3
    networks:
      - medusa-network
      - red-compartida
    security_opt:
      - no-new-privileges:true
    mem_reservation: 512m
    mem_limit: 1g
    pids_limit: 1000
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres-data:
  backend-server-data:
  cache-backend-data:

networks:
  proxiable:
    external: true
    name: proxiable
  medusa-network:
    driver: bridge
  red-compartida:
    external: true
    name: red-compartida
