services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: medusa-starter
      POSTGRES_PASSWORD: medusa-password
      POSTGRES_DB: medusa-starter
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "medusa-starter"]
      interval: 10s
      timeout: 5s

  redis:
    image: redis:8
    ports:
      - 6379:6379
    volumes:
      - cache-backend-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-server:
    image: ubuntu:24.04
    init: true
    volumes:
      - .:/workspace:cached
      - opencode-data:/home/ubuntu/.local/share/opencode
      # OpenCode config persistence (opencode.jsonc, oh-my-openagent.json, plugins)
      - opencode-config:/home/ubuntu/.config/opencode
      # OpenCode cache (models, bins - avoids re-downloading ~2MB each time)
      - opencode-cache:/home/ubuntu/.cache/opencode
    working_dir: /workspace
    command: sleep infinity
    ports:
      - 9000:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - default
      - observability-net

volumes:
  postgres-data:
  cache-backend-data:
  opencode-data:
  opencode-config:
  opencode-cache:

networks:
  observability-net:
    external: true
    name: observability-net
