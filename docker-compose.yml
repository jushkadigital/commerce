services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: medusa-starter
      POSTGRES_PASSWORD: medusa-password
      POSTGRES_DB: medusa-starter
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "medusa-starter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    ports:
      - 6379:6379
    volumes:
      - cache-backend-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-server:
    image: ubuntu:24.04
    volumes:
      - .:/home/node/app:cached
      - backend-server-data:/data
    working_dir: /home/node/app
    command: sleep infinity
    ports:
      - 9000:9000

    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    environment:
      - DISPLAY=${DISPLAY}  # Pasamos la variable DISPLAY del host

volumes:
  postgres-data:
  backend-server-data:
  cache-backend-data:
  meilisearch-data:

